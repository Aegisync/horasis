<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horasis OPS | Operations Platform System</title>
    <meta name="description" content="Horasis OPS - Carrier-grade Intelligence Layer by Aegisync.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00F0FF;
            --bg-dark: #0B1015;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 80% 20%, #1a2a33 0%, transparent 40%);
            margin: 0;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(23, 28, 34, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-btn {
            background: linear-gradient(90deg, #00F0FF 0%, #00D1FF 100%);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            transition: all 0.3s ease;
        }
        .neon-btn:hover {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
            transform: translateY(-1px);
        }
        .input-field {
            background: rgba(45, 52, 60, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: var(--neon-cyan);
            outline: none;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <main class="flex-grow flex items-center justify-center p-6 lg:p-16">
        <div class="max-w-7xl w-full flex flex-col lg:flex-row items-center justify-between gap-12">
